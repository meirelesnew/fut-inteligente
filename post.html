<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO dinâmico via JS -->
  <title>Fut Inteligente | Carregando...</title>
  <meta name="description" content="">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Fut Inteligente">
  <meta property="og:locale" content="pt_BR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="style.css">
  <style>
    .post-content {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 32px 24px;
      margin: 24px 0;
      line-height: 1.8;
    }
    .post-content h2 {
      border-left: none;
      padding-left: 0;
      margin: 24px 0 12px;
      font-size: 1.3rem;
    }
    .post-content h3 {
      color: #e63329;
      margin: 20px 0 8px;
      font-size: 1.1rem;
    }
    .post-content p {
      margin-bottom: 16px;
      color: #ccc;
    }
    .post-header {
      margin: 32px 0 8px;
    }
    .post-header h1 {
      font-size: 1.6rem;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .post-meta {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }
    .tag {
      background: #222;
      border: 1px solid #333;
      color: #aaa;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .voltar {
      display: inline-block;
      color: #e63329;
      text-decoration: none;
      font-size: 0.9rem;
      margin: 16px 0;
    }
    .voltar:hover {
      text-decoration: underline;
    }
    .compartilhar {
      margin: 24px 0;
      padding: 16px;
      background: #111;
      border-radius: 8px;
      text-align: center;
    }
    .compartilhar p {
      color: #888;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .btn-whatsapp {
      background: #25D366;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <h1>⚽ Fut Inteligente</h1>
      <p class="tagline">Futebol com Inteligência Artificial</p>
      <nav>
        <a href="index.html#posts">Notícias</a>
        <a href="index.html#tabelas">Tabelas</a>
        <a href="index.html#flamengo">Flamengo</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <a href="index.html" class="voltar">← Voltar para notícias</a>

    <div id="post-container">
      <p class="carregando">Carregando post...</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 Fut Inteligente | Powered by IA</p>
      <p><a href="sitemap.xml">Sitemap</a></p>
    </div>
  </footer>

  <script>
    const API = 'https://fut-inteligente.onrender.com';

    async function carregarPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const res = await fetch(`${API}/api/posts/${slug}`);
        const post = await res.json();

        if (post.erro) {
          document.getElementById('post-container').innerHTML =
            '<p class="erro">Post não encontrado.</p>';
          return;
        }

        // Atualizar SEO dinamicamente
        document.title = `${post.titulo} | Fut Inteligente`;
        document.querySelector('meta[name="description"]').setAttribute('content', post.resumo || '');
        document.querySelector('meta[property="og:title"]')?.setAttribute('content', post.titulo);
        document.querySelector('meta[property="og:description"]')?.setAttribute('content', post.resumo || '');
        document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', post.titulo);

        const data = new Date(post.criadoEm).toLocaleDateString('pt-BR', {
          day: '2-digit', month: 'long', year: 'numeric'
        });

        const tags = (post.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

        const urlAtual = encodeURIComponent(window.location.href);
        const textoWhatsapp = encodeURIComponent(`${post.titulo} - Fut Inteligente`);

        document.getElementById('post-container').innerHTML = `
          <div class="post-header">
            <h1>${post.titulo}</h1>
            <p class="post-meta">📅 ${data}</p>
            <div class="tags">${tags}</div>
          </div>

          <div class="post-content">
            ${post.conteudo}
          </div>

          <div class="compartilhar">
            <p>Gostou? Compartilha com seus amigos!</p>
            <a class="btn-whatsapp"
               href="https://wa.me/?text=${textoWhatsapp}%20${urlAtual}"
               target="_blank">
              📲 Compartilhar no WhatsApp
            </a>
          </div>
        `;

      } catch (err) {
        document.getElementById('post-container').innerHTML =
          '<p class="erro">Erro ao carregar post.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', carregarPost);
  </script>

</body>
</html>
